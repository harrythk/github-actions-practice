name: Deploy to Server

on:
  workflow_call:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
      DOCKER_TAG: ${{ github.event.workflow_run.head_sha }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: SSH to prod Server and create App directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_SSH_HOST }}
          username: ${{ secrets.EC2_SSH_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            echo "Installing required packages and creating folder"
            sudo apt-get update && sudo apt-get install docker.io docker-compose-v2 -y
            sudo usermod -aG docker $USER
            mkdir -p devops
      
      - name: Copy Docker Compose file
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.EC2_SSH_HOST }}
          username: ${{ secrets.EC2_SSH_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          source: docker-compose.yml
          target: ~/devops

      - name: SSH to prod Server and create App directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_SSH_HOST }}
          username: ${{ secrets.EC2_SSH_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            echo "Running App"
            export DOCKERHUB_USERNAME=${{ vars.DOCKERHUB_USERNAME }}
            export DOCKER_TAG=${{ github.event.workflow_run.head_sha }}
            export DOCKER_TAG=${{ github.sha }}
            echo ${{ github.sha }}
            echo ${{ secrets.DOCKERHUB_TOKEN }} | docker login --username ${{ vars.DOCKERHUB_USERNAME }} --password-stdin
            cd ~/devops && docker compose down && docker compose up -d --build --force-recreate --pull always

